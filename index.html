<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parental Controls - Wealthsimple</title>
    <style>
        @font-face {
            font-family: 'Wealthsimple Sans';
            src: url('Wealthsimple-Sans-Display-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Wealthsimple Sans';
            src: url('Wealthsimple-Sans-Display-Medium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Wealthsimple Sans';
            src: url('Wealthsimple-Sans-Display-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Wealthsimple Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .phone-frame {
            width: 393px;
            height: 852px;
            background: #fff;
            border-radius: 47px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            height: 54px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            font-size: 15px;
            font-weight: 500;
            color: #32302f;
            flex-shrink: 0;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .nav-header {
            padding: 8px 20px 40px;
            background: #fff;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .back-button {
            position: absolute;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            color: #32302f;
            padding: 0;
        }

        .page-title {
            font-size: 17px;
            font-weight: 600;
            color: #32302f;
            letter-spacing: 0;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 40px;
            background: #fff;
            animation: fadeIn 0.3s ease-out;
        }

        .menu-item {
            background: transparent;
            border-bottom: 1px solid #E5E5E5;
            padding: 20px 0;
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #32302f;
            transition: transform 0.2s, opacity 0.2s;
            cursor: pointer;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:active {
            transform: scale(0.98);
            opacity: 0.6;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .menu-icon svg {
            width: 24px;
            height: 24px;
        }

        .menu-content {
            flex: 1;
        }

        .menu-label {
            font-size: 15px;
            font-weight: 500;
            color: #32302f;
        }

        .menu-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            margin-right: 4px;
        }

        .status-badge.on {
            background: #E8F5EA;
            color: #527E58;
        }

        .status-badge.off {
            background: #EFEFEF;
            color: #32302f;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: #32302f;
            border-radius: 3px;
        }

        /* Remove number input spinner arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .toast {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #EBEFFA;
            border-radius: 16px;
            width: 206px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .toast.hide {
            transform: translateX(-50%) translateY(-120px);
            opacity: 0;
        }

        .toast-icon {
            width: 18px;
            height: 18px;
            background: #305FAA;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast-icon svg {
            width: 10px;
            height: 10px;
        }

        .toast-message {
            font-family: 'Wealthsimple Sans Display', 'Wealthsimple Sans', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #305FAA;
            white-space: nowrap;
        }
    </style>
</head>

    <script>
        function setBadgeState(badgeId, isActive) {
            const badge = document.getElementById(badgeId);
            if (isActive) {
                badge.textContent = 'On';
                badge.classList.remove('off');
                badge.classList.add('on');
            } else {
                badge.textContent = 'Off';
                badge.classList.remove('on');
                badge.classList.add('off');
            }
        }

        function updateBadges() {
            // Notifications
            const notificationsRaw = localStorage.getItem('notifications');
            let hasActiveNotification = false;
            if (notificationsRaw) {
                const notifications = JSON.parse(notificationsRaw);
                hasActiveNotification = Object.values(notifications).some(n => n && n.active);
            }
            setBadgeState('notifications-badge', hasActiveNotification);

            // Spend limits
            const spendLimitsRaw = localStorage.getItem('spendLimits');
            let hasActiveLimit = false;
            if (spendLimitsRaw) {
                const spendLimits = JSON.parse(spendLimitsRaw);
                hasActiveLimit = Object.values(spendLimits).some(l => l && l.active);
            }
            setBadgeState('spend-limits-badge', hasActiveLimit);

            // Restrictions - default to OFF, only ON if youth has active restrictions
            const restrictionsRaw = localStorage.getItem('restrictions');
            let hasActiveRestriction = false; // default OFF
            if (restrictionsRaw) {
                const restrictions = JSON.parse(restrictionsRaw);
                // Check if any youth transaction restrictions are active
                const hasYouthTransactionRestriction = restrictions.youth &&
                    restrictions.youth.transactions &&
                    Object.values(restrictions.youth.transactions).some(t => t);
                // Check if gaming category is restricted
                const hasYouthGamingRestriction = restrictions.youth &&
                    restrictions.youth.categories &&
                    restrictions.youth.categories.gaming === true;

                hasActiveRestriction = hasYouthTransactionRestriction || hasYouthGamingRestriction;
            }
            setBadgeState('restrictions-badge', hasActiveRestriction);

            // International
            const internationalRaw = localStorage.getItem('international');
            let hasActiveInternational = false;
            if (internationalRaw) {
                const international = JSON.parse(internationalRaw);
                hasActiveInternational = international.active;
            }
            setBadgeState('international-badge', hasActiveInternational);
        }

        updateBadges();
        window.addEventListener('storage', updateBadges);
        window.addEventListener('focus', updateBadges);

        // Toast notification
        let toastTimeout;

        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('show');
            toast.classList.add('hide');
            if (toastTimeout) clearTimeout(toastTimeout);
        }

        function showToast() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('saved') === 'true') {
                const toast = document.getElementById('toast');

                // Show toast with animation
                setTimeout(() => {
                    toast.classList.remove('hide');
                    toast.classList.add('show');
                }, 100);

                // Auto-hide after 2 seconds
                toastTimeout = setTimeout(() => {
                    hideToast();
                }, 2000);

                // Add swipe up gesture
                let touchStartY = 0;
                let touchEndY = 0;

                toast.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });

                toast.addEventListener('touchmove', (e) => {
                    touchEndY = e.touches[0].clientY;
                }, { passive: true });

                toast.addEventListener('touchend', () => {
                    const swipeDistance = touchStartY - touchEndY;
                    if (swipeDistance > 30) {
                        hideToast();
                    }
                }, { passive: true });

                // Clean up URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        showToast();
    </script>
